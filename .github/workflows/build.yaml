---
name: 'build'

on:
  push:
    branches:
      - 'main'
  pull_request:
    branches:
      - 'main'
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: 'read'

jobs:
  test:
    name: '${{ matrix.os }}'
    runs-on: '${{ matrix.os }}'
    strategy:
      matrix:
        os:
          - 'ubuntu-latest'
          - 'windows-latest'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@v6.0.3'
      - name: 'Set up Go'
        uses: 'actions/setup-go@v6.4.0'
        with:
          go-version-file: 'go.mod'
      - name: 'Check formatting'
        if: "matrix.os == 'ubuntu-latest'"
        run: 'make fmt-check'
      - name: 'Run go vet'
        if: "matrix.os == 'ubuntu-latest'"
        run: 'go vet ./...'
      - name: 'Run tests'
        run: 'make test'
      - name: 'Run build'
        run: 'make build'
